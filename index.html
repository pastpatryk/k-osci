<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0e1220" />
    <title>Yahtzee · two-player</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <style>
      /* ------- Design tokens (OKLCH high-gamut) ------- */
      :root {
        --bg-0: oklch(15% 0.02 250);
        --bg-1: oklch(12% 0.03 270);
        --surface: color-mix(in oklch, white 10%, transparent);
        --border: color-mix(in oklch, white 20%, transparent);
        --text: oklch(96% 0.01 260);
        --muted: oklch(70% 0.02 260);
        --accent: oklch(70% 0.3 260);
        --accent-soft: color-mix(in oklch, var(--accent) 35%, transparent);
        --accent-glow: color-mix(in oklch, var(--accent) 45%, transparent);
        --danger: oklch(70% 0.2 25);
        --ok: oklch(75% 0.2 150);
        --radius-lg: 2rem;
        --radius-md: 1rem;
        --radius-sm: 0.625rem;
        --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }

      @supports not (background: color-mix(in oklch, white 10%, transparent)) {
        :root {
          --surface: rgba(255,255,255,0.1);
          --border: rgba(255,255,255,0.2);
          --accent-soft: rgba(124, 92, 255, 0.35);
          --accent-glow: rgba(124, 92, 255, 0.45);
        }
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        min-height: 100dvh;
        font-family: var(--font);
        color: var(--text);
        background:
          radial-gradient(ellipse at 30% 20%, oklch(18% 0.05 280) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 80%, oklch(15% 0.08 300) 0%, transparent 50%),
          linear-gradient(180deg, var(--bg-0), var(--bg-1));
        background-attachment: fixed;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      button {
        font-family: inherit;
        color: inherit;
        background: none;
        border: none;
        cursor: pointer;
      }
      button:disabled { cursor: not-allowed; }

      /* ------- Layout ------- */

      .app-root {
        min-height: 100dvh;
        padding: 1rem;
        display: grid;
        gap: 1rem;
      }

      .bento {
        background: var(--surface);
        backdrop-filter: blur(24px) saturate(1.2);
        -webkit-backdrop-filter: blur(24px) saturate(1.2);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.25rem;
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.06),
          0 10px 40px rgba(0,0,0,0.35);
      }

      /* ------- Status pill ------- */

      .status-pill {
        position: fixed;
        top: 0.85rem;
        right: 0.85rem;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 0.8rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        font-size: 0.82rem;
        color: var(--muted);
        z-index: 100;
      }
      .status-pill .dot {
        width: 0.55rem; height: 0.55rem; border-radius: 50%;
        background: var(--muted);
      }
      .status-pill[data-status="connected"] .dot { background: var(--ok); box-shadow: 0 0 10px var(--ok); }
      .status-pill[data-status="connecting"] .dot,
      .status-pill[data-status="waiting"] .dot {
        background: var(--accent);
        animation: pulse 1.1s ease-in-out infinite;
      }
      .status-pill[data-status="disconnected"] .dot { background: var(--danger); }
      @keyframes pulse { 50% { opacity: 0.35; } }

      /* ------- Lobby ------- */

      .lobby {
        min-height: 80dvh;
        display: grid;
        place-items: center;
      }
      .lobby-card {
        width: min(34rem, 100%);
        text-align: center;
      }
      .title {
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        margin: 0 0 0.35rem 0;
        letter-spacing: -0.02em;
        font-weight: 700;
      }
      .title .mono { color: var(--accent); }
      .sub { color: var(--muted); margin: 0 0 1.25rem 0; }
      .share-row {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }
      .share-url {
        flex: 1 1 auto;
        min-width: 0;
        padding: 0.8rem 1rem;
        border-radius: var(--radius-md);
        background: rgba(0,0,0,0.25);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 0.85rem;
      }
      .share-url:focus { outline: 2px solid var(--accent); }
      .hint {
        color: var(--muted);
        font-size: 0.88rem;
        margin-bottom: 1rem;
      }
      .hint .ok { color: var(--ok); }
      .spinner {
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        animation: spin 0.9s linear infinite;
        margin: 1rem auto 0;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ------- Buttons ------- */

      .btn {
        padding: 0.7rem 1.25rem;
        border-radius: var(--radius-md);
        background: var(--surface);
        border: 1px solid var(--border);
        font-weight: 600;
        font-size: 0.95rem;
        transition: transform 120ms ease, background 200ms, border-color 200ms, box-shadow 200ms;
      }
      .btn:hover:not(:disabled) { transform: translateY(-1px); }
      .btn:active:not(:disabled) { transform: translateY(0); }
      .btn:disabled { opacity: 0.4; }
      .btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: oklch(15% 0.02 260);
        box-shadow: 0 0 1.4rem var(--accent-soft);
      }
      .btn.primary:hover:not(:disabled) {
        box-shadow: 0 0 2rem var(--accent-glow);
      }
      .btn.start {
        margin-top: 0.75rem;
        background: var(--accent);
        color: oklch(15% 0.02 260);
        border-color: var(--accent);
        box-shadow: 0 0 1.6rem var(--accent-soft);
        padding: 0.9rem 1.5rem;
        font-size: 1.05rem;
      }
      .btn.roll {
        width: 100%;
        padding: 1.1rem;
        font-size: 1.1rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        background: var(--accent);
        color: oklch(15% 0.02 260);
        border-color: var(--accent);
        box-shadow: 0 0 1.4rem var(--accent-soft);
      }
      .btn.roll:disabled { background: var(--surface); color: var(--muted); box-shadow: none; border-color: var(--border); }
      .btn.ghost { background: transparent; }
      .btn.danger { color: var(--danger); border-color: var(--danger); }

      /* ------- Board ------- */

      .board {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1fr;
      }
      @media (min-width: 900px) {
        .board {
          grid-template-columns: 1fr 1fr;
          grid-template-areas:
            "self peer"
            "dice dice";
        }
        .player-card.self { grid-area: self; }
        .player-card.peer { grid-area: peer; }
        .dice-area { grid-area: dice; }
      }

      .player-card.active {
        border-color: var(--accent);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.06),
          0 10px 40px rgba(0,0,0,0.35),
          0 0 1.4rem var(--accent-soft);
      }

      .player-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 0.75rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--border);
      }
      .player-label {
        font-size: 0.8rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .player-total {
        font-size: 2rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .player-meta {
        text-align: right;
        font-size: 0.82rem;
      }
      .tally { color: var(--muted); }
      .turn-dot {
        display: inline-block;
        margin-top: 0.25rem;
        color: var(--accent);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 0.72rem;
      }

      /* ------- Scorecard ------- */

      .scorecard {
        display: grid;
        gap: 0.25rem;
      }
      .scorecard .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.55rem 0.75rem;
        border-radius: var(--radius-sm);
        border: 1px solid transparent;
        background: rgba(255,255,255,0.02);
        color: var(--text);
        font-size: 0.92rem;
        text-align: left;
        width: 100%;
        transition: background 160ms, border-color 160ms, box-shadow 240ms, transform 160ms;
      }
      .scorecard .row.banked { background: rgba(255,255,255,0.04); }
      .scorecard .row.banked .row-val {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .scorecard .row.open .row-val { color: var(--muted); font-variant-numeric: tabular-nums; }
      .scorecard .row.open:not(:disabled):hover { background: rgba(255,255,255,0.07); }
      .scorecard .row.glow {
        border-color: var(--accent);
        box-shadow: 0 0 1.2rem var(--accent-soft);
      }
      .scorecard .row.glow:hover { transform: translateY(-1px); box-shadow: 0 0 1.6rem var(--accent-glow); }
      .scorecard .row.flash {
        animation: flash 0.8s ease-out;
      }
      @keyframes flash {
        0% { border-color: var(--accent); box-shadow: 0 0 2rem var(--accent); }
        100% { border-color: transparent; box-shadow: none; }
      }
      .scorecard .subrow {
        display: flex;
        justify-content: space-between;
        padding: 0.35rem 0.75rem;
        color: var(--muted);
        font-size: 0.85rem;
      }
      .scorecard .subrow.total {
        color: var(--text);
        font-weight: 700;
        border-top: 1px solid var(--border);
        margin-top: 0.25rem;
        padding-top: 0.6rem;
      }

      /* ------- Dice ------- */

      .dice-area { display: grid; gap: 0.9rem; }
      .turn-banner {
        text-align: center;
        padding: 0.5rem 0;
        color: var(--muted);
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .turn-banner.yours { color: var(--text); }
      .turn-banner.theirs { color: var(--muted); font-style: italic; }

      .dice-tray {
        display: flex;
        gap: 0.6rem;
        justify-content: center;
        flex-wrap: wrap;
        padding: 0.5rem 0;
        perspective: 1000px;
      }

      .die {
        --size: clamp(3.2rem, 12vw, 4.8rem);
        width: var(--size);
        height: var(--size);
        border-radius: 1rem;
        background: linear-gradient(135deg, #fff, #e6e3f0);
        color: oklch(25% 0.03 260);
        position: relative;
        transition: transform 160ms ease, box-shadow 220ms;
        box-shadow:
          inset 0 -4px 0 rgba(0,0,0,0.08),
          0 6px 20px rgba(0,0,0,0.3);
      }
      .die.held {
        background: linear-gradient(135deg, oklch(80% 0.15 260), oklch(65% 0.2 260));
        box-shadow:
          inset 0 0 0 3px var(--accent),
          0 4px 18px var(--accent-soft);
        transform: scale(0.94);
      }
      .die.locked { filter: saturate(0.6) brightness(0.85); }
      .die-face {
        position: absolute;
        inset: 12%;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 4%;
        transition: transform 600ms cubic-bezier(.2,.8,.2,1);
        transform-style: preserve-3d;
      }
      @media (prefers-reduced-motion: reduce) {
        .die-face { transition: none; }
      }
      .pip {
        background: currentColor;
        border-radius: 50%;
        place-self: center;
        width: 22%;
        height: 22%;
        min-width: 6px; min-height: 6px;
      }

      /* ------- Overlays ------- */

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(5, 6, 14, 0.65);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: grid;
        place-items: center;
        z-index: 200;
        padding: 1rem;
        animation: fadein 300ms ease-out;
      }
      @keyframes fadein { from { opacity: 0; } }
      .overlay-card {
        width: min(28rem, 100%);
        text-align: center;
      }
      .overlay-card.small { width: min(22rem, 100%); }
      .overlay h2 { margin-top: 0; font-size: 1.5rem; }
      .overlay h3 { margin-top: 0; }
      .overlay.gameover.win h2 { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }

      .final {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin: 1rem 0 0.5rem 0;
      }
      .final > div {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }
      .final span { color: var(--muted); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.1em; }
      .final strong {
        font-size: 2.25rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .final-tally {
        color: var(--muted);
        margin: 0.75rem 0 1rem 0;
        font-size: 0.9rem;
      }
      .cta {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
